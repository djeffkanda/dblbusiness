# bldbusiness — Presentation Tier NGINX config (ALB + Auto Scaling)
#
# Use this when the application tier sits behind an INTERNAL Application Load
# Balancer and Auto Scaling Group — do NOT use a fixed private IP.
#
# Replace INTERNAL_APP_ALB_DNS with your internal ALB DNS name, e.g.:
#   internal-bldbusiness-app-123456789.us-east-1.elb.amazonaws.com
#
# Replace VPC_DNS_RESOLVER with your VPC DNS (from: cat /etc/resolv.conf)
#   Typically the .2 address of your VPC CIDR, e.g. 10.0.0.2

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Required so NGINX re-resolves the internal ALB DNS as targets scale
    resolver VPC_DNS_RESOLVER valid=10s ipv6=off;
    set $app_upstream INTERNAL_APP_ALB_DNS;

    # React SPA — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to application tier via internal ALB
    location /api {
        proxy_pass http://$app_upstream/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — public ALB can hit this path on the presentation instance
    # (checks NGINX only; internal ALB has its own /health check on app instances)
    location /health {
        proxy_pass http://$app_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
