# bldbusiness — Presentation Tier NGINX config
# Replace APPLICATION_TIER_PRIVATE_IP with your application-tier EC2 private IP

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy to application tier
    location /api {
        proxy_pass http://APPLICATION_TIER_PRIVATE_IP:3200/api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint (optional)
    location /health {
        proxy_pass http://APPLICATION_TIER_PRIVATE_IP:3200/health;
    }
}
